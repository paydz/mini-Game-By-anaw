{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>Lucky Coin - Đăng nhập</h2>
    <form method="POST">
        <input name="username" placeholder="Tên đăng nhập" required>
        <input name="password" type="password" placeholder="Mật khẩu" required>
        <button type="submit" class="green">Đăng nhập</button>
    </form>
    <a href="/register">Chưa có tài khoản? Đăng ký ngay</a>
</div>
{% endblock %}
