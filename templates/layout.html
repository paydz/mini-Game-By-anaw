<!DOCTYPE html>
<html>
<head>
    <title>Lucky Coin</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: Arial;
            color: white;
            text-align: center;
        }
        .card {
            background: #1e293b;
            padding: 25px;
            margin: 40px auto;
            width: 90%;
            max-width: 420px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }
        input {
            padding: 12px;
            width: 90%;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }
        button, .btn {
            padding: 12px;
            width: 90%;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            margin: 6px 0;
            cursor: pointer;
        }
        .green { background: #22c55e; }
        .blue { background: #3b82f6; color: white; }
        .red { background: #ef4444; color: white; }
        a { color: #facc15; text-decoration: none; }
    </style>
</head>
<body>

{% block content %}{% endblock %}

</body>
</html>
