<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Coin</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Căn giữa tuyệt đối nội dung bên trong body */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Cấu hình ảnh nền từ link bạn gửi */
            background-image: url('https://images.pexels.com/photos/32203209/pexels-photo-32203209.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden; /* Ngăn cuộn trang không cần thiết */
        }

        /* Lớp phủ tối để làm nổi bật khung đăng nhập */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2; /* Nổi lên trên lớp phủ */
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            width: 90%;
            max-width: 380px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { margin-bottom: 25px; color: #1e293b; font-size: 24px; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .green { background: #22c55e; color: white; }
        .green:hover { background: #16a34a; }
        
        .blue { background: #3b82f6; color: white; }
        .blue:hover { background: #2563eb; }

        .red { background: #ef4444; color: white; }

        a {
            display: inline-block;
            margin-top: 15px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
